<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — D'zine Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #dfe6fb; }

        .admin-app {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            margin: 16px 0 16px 16px;
            border-radius: 24px;
            padding: 24px 16px;
            position: sticky;
            top: 16px;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 60px -20px rgba(53,49,110,0.25);
        }
        .sidebar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px;
        }
        .sidebar .brand .mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 8px 24px -8px rgba(123,110,240,0.5);
        }
        .sidebar .brand .name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 20px; color: #1d2433; }
        .sidebar .brand .sub { font-size: 9px; letter-spacing: 0.3em; color: #929bb0; font-weight: 600; text-transform: uppercase; }

        .sidebar .nav-label { font-size: 10px; letter-spacing: 0.15em; font-weight: 700; color: #929bb0; padding: 0 12px; text-transform: uppercase; margin-top: 4px; }
        .sidebar .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            color: #5b6478;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .sidebar .nav-item:hover { background: rgba(255,255,255,0.7); color: #1d2433; transform: translateX(4px); }
        .sidebar .nav-item.active {
            background: rgba(255,255,255,0.85);
            color: #1d2433;
            font-weight: 600;
            border-color: rgba(255,255,255,0.9);
            box-shadow: 0 4px 16px -8px rgba(53,49,110,0.15);
        }
        .sidebar .nav-item .ico { font-size: 18px; width: 24px; text-align: center; flex: none; }
        .sidebar .nav-item .badge {
            margin-left: auto;
            background: #7b6ef0;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        .sidebar .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 8px 0;
            border-top: 1px solid rgba(29,36,51,0.06);
        }
        .sidebar .user-chip {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar .user-chip .av {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            background: linear-gradient(135deg, #5b8def, #7b6ef0);
            box-shadow: 0 4px 12px -4px rgba(123,110,240,0.4);
        }
        .sidebar .user-chip .nm { font-size: 14px; font-weight: 600; color: #1d2433; }
        .sidebar .user-chip .role { font-size: 11px; color: #929bb0; font-weight: 500; }
        .sidebar .btn-quiet {
            background: transparent;
            border: none;
            color: #929bb0;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 500;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .sidebar .btn-quiet:hover { color: #1d2433; background: rgba(255,255,255,0.5); }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main {
            padding: 24px 32px 48px;
            min-width: 0;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .main-header h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #1d2433;
        }
        .main-header h1 i { color: #7b6ef0; margin-right: 12px; }
        .main-header p {
            color: #5b6478;
            font-size: 14px;
            margin-top: 2px;
        }
        .main-header .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            color: #fff;
            box-shadow: 0 8px 24px -8px rgba(123,110,240,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px -8px rgba(123,110,240,0.5); }
        .btn-ghost {
            background: rgba(255,255,255,0.7);
            color: #1d2433;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.9); }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 8px 24px -8px rgba(231,76,60,0.4);
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 12px 32px -8px rgba(231,76,60,0.5); }

        /* Card */
        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px -16px rgba(53,49,110,0.08);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #1d2433;
        }
        .card-header .total {
            font-size: 13px;
            color: #5b6478;
        }
        .card-header .total strong {
            color: #7b6ef0;
            font-size: 18px;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table th {
            text-align: left;
            padding: 12px 16px;
            color: #5b6478;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid rgba(29,36,51,0.06);
        }
        table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(29,36,51,0.04);
            color: #1d2433;
        }
        table tr:hover { background: rgba(255,255,255,0.3); }
        table tr:last-child td { border-bottom: 0; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-badge.active { background: #dcf3e8; color: #1d8d59; }
        .status-badge.inactive { background: #fee; color: #c00; }
        .status-badge.pending { background: #fdeede; color: #a4661f; }

        .action-btn {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            background: transparent;
            color: #5b6478;
            transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(123,110,240,0.1); color: #7b6ef0; }
        .action-btn.danger:hover { background: rgba(220,0,0,0.1); color: #c00; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #929bb0;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state h4 { font-size: 18px; color: #1d2433; margin-bottom: 4px; }
        .empty-state p { font-size: 13px; }

        /* Search Bar */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.8);
            flex: 1;
            max-width: 320px;
        }
        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            color: #1d2433;
            width: 100%;
        }
        .search-bar input::placeholder { color: #929bb0; }
        .search-bar i { color: #929bb0; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .modal p { color: #5b6478; font-size: 14px; margin-bottom: 20px; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #5b6478;
            margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(29,36,51,0.1);
            font-family: inherit;
            font-size: 13px;
            background: rgba(255,255,255,0.8);
            outline: none;
            transition: all 0.2s;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus {
            border-color: #7b6ef0;
            box-shadow: 0 0 0 3px rgba(123,110,240,0.1);
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal .modal-actions .btn { flex: 1; justify-content: center; }

        @media (max-width: 768px) {
            .admin-app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main { padding: 16px; }
            .main-header { flex-direction: column; align-items: flex-start; }
            .search-bar { max-width: 100%; }
            .modal { padding: 24px; }
        }
    </style>
    <script src="../../assets/js/config.js"></script>
</head>
<body>
    <div class="admin-app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="mark">D</div>
                <div>
                    <div class="name">D'zine</div>
                    <div class="sub">Admin Panel</div>
                </div>
            </div>

            <div class="nav-label">Main</div>
            <nav class="nav">
                <div class="nav-item" onclick="window.location.href='admin-dashboard.html'">
                    <span class="ico"><i class="fas fa-th-large"></i></span> Dashboard
                </div>
                <div class="nav-item active">
                    <span class="ico"><i class="fas fa-users"></i></span> Clients
                    <span class="badge" id="clientCount">0</span>
                </div>
                <div class="nav-item" onclick="window.location.href='admin-projects.html'">
                    <span class="ico"><i class="fas fa-folder-open"></i></span> Projects
                    <span class="badge" id="projectCount">0</span>
                </div>
                <div class="nav-item" onclick="window.location.href='admin-deliverables.html'">
                    <span class="ico"><i class="fas fa-box"></i></span> Deliverables
                </div>
            </nav>

            <div class="user-section">
                <div class="user-chip">
                    <div class="av" id="adminAv">AD</div>
                    <div>
                        <div class="nm" id="adminNm">Admin</div>
                        <div class="role">Administrator</div>
                    </div>
                </div>
                <button class="btn-quiet" onclick="logout()" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <div class="main-header">
                <div>
                    <h1><i class="fas fa-users"></i>Clients</h1>
                    <p>Manage your studio clients and their projects.</p>
                </div>
                <div class="actions">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search clients..." oninput="filterClients()">
                    </div>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> Add Client
                    </button>
                </div>
            </div>

            <!-- Clients Table -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-list" style="color:#7b6ef0;margin-right:8px;"></i>All Clients</h3>
                    <span class="total">Total: <strong id="totalClients">0</strong></span>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th><i class="fas fa-user"></i> Client</th>
                                <th><i class="fas fa-envelope"></i> Email</th>
                                <th><i class="fas fa-building"></i> Company</th>
                                <th><i class="fas fa-folder"></i> Projects</th>
                                <th><i class="fas fa-circle"></i> Status</th>
                                <th style="text-align:center;"><i class="fas fa-cog"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTable">
                            <!-- Rendered by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="clientModal">
        <div class="modal">
            <h2 id="modalTitle">Add New Client</h2>
            <p id="modalSub">Fill in the details to create a new client account.</p>
            <form id="clientForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="clientName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="clientEmail" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="clientCompany" placeholder="Company Name">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password</label>
                    <input type="password" id="clientPassword" placeholder="Enter password (min 6 chars)">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="clientStatus">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Client</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = CONFIG.API_BASE;
        let allClients = [];

        function getToken() { return localStorage.getItem('token'); }
        function getUser() {
            try { return JSON.parse(localStorage.getItem('user')); }
            catch(e) { return null; }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'admin-login.html';
        }

        // ============================================
        // LOAD CLIENTS
        // ============================================
        async function loadClients() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'admin-login.html';
                return;
            }

            document.getElementById('adminNm').textContent = user.full_name || 'Admin';
            document.getElementById('adminAv').textContent = (user.full_name || 'AD').substring(0, 2).toUpperCase();

            try {
                const token = getToken();
                const res = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const users = await res.json();
                    allClients = users.filter(u => u.role === 'client');
                    renderClients(allClients);
                }
            } catch (error) {
                console.error('Error loading clients:', error);
                // Fallback demo data
                allClients = [
                    { id: 1, full_name: 'Aria Khan', email: 'aria@example.com', company_name: 'Saffron & Sage', is_active: true, project_count: 1 },
                    { id: 2, full_name: 'John Doe', email: 'john@example.com', company_name: 'TechCorp', is_active: true, project_count: 0 },
                    { id: 3, full_name: 'Sarah Smith', email: 'sarah@example.com', company_name: 'Design Studio', is_active: false, project_count: 2 },
                ];
                renderClients(allClients);
            }
        }

        // ============================================
        // RENDER CLIENTS
        // ============================================
        function renderClients(clients) {
            const tbody = document.getElementById('clientsTable');
            document.getElementById('clientCount').textContent = clients.length;
            document.getElementById('totalClients').textContent = clients.length;

            if (clients.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="icon"><i class="fas fa-users"></i></div>
                                <h4>No Clients Yet</h4>
                                <p>Click "Add Client" to create your first client account.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = clients.map(c => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#5b8def,#7b6ef0);color:#fff;font-weight:700;font-size:13px;flex:none;">
                                ${c.full_name ? c.full_name.substring(0, 2).toUpperCase() : '??'}
                            </div>
                            <div>
                                <div style="font-weight:600;">${c.full_name || 'Unknown'}</div>
                                <div style="font-size:11px;color:#929bb0;">ID: #${c.id || 'N/A'}</div>
                            </div>
                        </div>
                    </td>
                    <td>${c.email || '-'}</td>
                    <td>${c.company_name || '-'}</td>
                    <td>${c.project_count || 0}</td>
                    <td>
                        <span class="status-badge ${c.is_active ? 'active' : 'inactive'}">
                            ${c.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td style="text-align:center;">
                        <button class="action-btn" onclick="openEditModal(${c.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn danger" onclick="deleteClient(${c.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================
        // SEARCH
        // ============================================
        function filterClients() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClients.filter(c => 
                (c.full_name && c.full_name.toLowerCase().includes(query)) ||
                (c.email && c.email.toLowerCase().includes(query)) ||
                (c.company_name && c.company_name.toLowerCase().includes(query))
            );
            renderClients(filtered);
        }

        // ============================================
        // MODAL
        // ============================================
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Client';
            document.getElementById('modalSub').textContent = 'Fill in the details to create a new client account.';
            document.getElementById('editId').value = '';
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientCompany').value = '';
            document.getElementById('clientPassword').value = '';
            document.getElementById('clientPassword').required = true;
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('clientStatus').value = 'active';
            document.getElementById('clientModal').classList.add('active');
        }

        function openEditModal(id) {
            const client = allClients.find(c => c.id === id);
            if (!client) return;

            document.getElementById('modalTitle').textContent = 'Edit Client';
            document.getElementById('modalSub').textContent = `Edit details for ${client.full_name}.`;
            document.getElementById('editId').value = id;
            document.getElementById('clientName').value = client.full_name || '';
            document.getElementById('clientEmail').value = client.email || '';
            document.getElementById('clientCompany').value = client.company_name || '';
            document.getElementById('clientPassword').value = '';
            document.getElementById('clientPassword').required = false;
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('clientStatus').value = client.is_active ? 'active' : 'inactive';
            document.getElementById('clientModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('clientModal').classList.remove('active');
        }

        // ============================================
        // SAVE CLIENT
        // ============================================
        document.getElementById('clientForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const data = {
                full_name: document.getElementById('clientName').value,
                email: document.getElementById('clientEmail').value,
                company_name: document.getElementById('clientCompany').value,
                is_active: document.getElementById('clientStatus').value === 'active'
            };

            if (!id) {
                data.password = document.getElementById('clientPassword').value;
                if (!data.password || data.password.length < 6) {
                    alert('Password must be at least 6 characters.');
                    return;
                }
            }

            try {
                const token = getToken();
                const url = id ? `${API_BASE}/admin/users/${id}` : `${API_BASE}/admin/users`;
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    closeModal();
                    loadClients();
                    alert(id ? '✅ Client updated successfully!' : '✅ Client added successfully!');
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + (error.error || 'Something went wrong'));
                }
            } catch (error) {
                console.error('Error saving client:', error);
                alert('❌ Error connecting to server.');
            }
        });

        // ============================================
        // DELETE CLIENT
        // ============================================
        async function deleteClient(id) {
            const client = allClients.find(c => c.id === id);
            if (!confirm(`Delete ${client?.full_name || 'this client'}? This action cannot be undone.`)) return;

            try {
                const token = getToken();
                const res = await fetch(`${API_BASE}/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    loadClients();
                    alert('🗑️ Client deleted successfully!');
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + (error.error || 'Something went wrong'));
                }
            } catch (error) {
                console.error('Error deleting client:', error);
                alert('❌ Error connecting to server.');
            }
        }

        // Close modal on outside click
        document.getElementById('clientModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('DOMContentLoaded', loadClients);
    </script>
</body>
</html>
