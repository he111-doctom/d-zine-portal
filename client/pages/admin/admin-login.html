<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — D'zine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #dfe6fb;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 18px 50px -20px rgba(53,49,110,0.35);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo .mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            display: inline-grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: 22px;
            box-shadow: 0 8px 18px -6px rgba(123,110,240,0.7);
        }
        .login-card .logo h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 24px;
            margin: 10px 0 4px;
        }
        .login-card .logo p {
            color: #5b6478;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #5b6478;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(29,36,51,0.08);
            background: rgba(255,255,255,0.7);
            font-family: inherit;
            font-size: 14px;
            color: #1d2433;
            outline: none;
        }
        .form-group input:focus {
            border-color: #7b6ef0;
            box-shadow: 0 0 0 3px rgba(123,110,240,0.15);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn:hover { box-shadow: 0 14px 30px -10px rgba(123,110,240,0.95); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 13px;
        }
        #message.error { display: block; background: #fee; color: #c00; border: 1px solid #fcc; }
        #message.success { display: block; background: #efe; color: #080; border: 1px solid #cfc; }
        #message.loading { display: block; background: #eef; color: #446; border: 1px solid #ccd; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #7b6ef0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #5b6478;
            font-size: 13px;
        }
        .back-link a { color: #7b6ef0; font-weight: 600; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
    <script src="../../assets/js/config.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="mark">D</div>
                <h1>Admin Login</h1>
                <p>Sign in to manage your studio</p>
            </div>

            <div id="message"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="adminEmail" placeholder="admin@dzine.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign In</button>
            </form>

            <div class="back-link">
                <a href="../login.html">← Back to Client Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = CONFIG.API_BASE;
        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('adminEmail');
        const passwordInput = document.getElementById('adminPassword');
        const message = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        // Check if already logged in as admin
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (user) {
                try {
                    const data = JSON.parse(user);
                    if (data.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            message.className = '';
            message.textContent = '';
            
            if (!email || !password) {
                message.className = 'error';
                message.textContent = '❌ Please enter both email and password';
                return;
            }

            message.className = 'loading';
            message.innerHTML = '<span class="spinner"></span> Signing in...';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Please wait...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.token && result.user) {
                    // Check if user is admin
                    if (result.user.role !== 'admin') {
                        message.className = 'error';
                        message.textContent = '❌ Access denied. Admin only.';
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Sign In';
                        return;
                    }

                    message.className = 'success';
                    message.textContent = '✅ Login successful! Redirecting...';
                    
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));

                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    message.className = 'error';
                    message.textContent = '❌ ' + (result.error || 'Login failed');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                message.className = 'error';
                message.textContent = '❌ Cannot connect to server. Make sure backend is running.';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
