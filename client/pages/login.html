<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — D'zine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #dfe6fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .auth-card {
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 18px 50px -20px rgba(53,49,110,0.35);
        }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header .brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .auth-header .mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: 22px;
            box-shadow: 0 8px 18px -6px rgba(123,110,240,0.7);
        }
        .auth-header .name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 20px; }
        .auth-header .sub { font-size: 10px; letter-spacing: 0.22em; color: #929bb0; font-weight: 600; }
        .auth-header h1 { font-size: 24px; margin-bottom: 4px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-header p { color: #5b6478; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #5b6478;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            color: #1d2433;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(29,36,51,0.08);
            background: rgba(255,255,255,0.7);
            outline: none;
        }
        .form-group input:focus {
            border-color: #7b6ef0;
            box-shadow: 0 0 0 3px rgba(123,110,240,0.15);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 16px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #5b6478;
            cursor: pointer;
        }
        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #7b6ef0;
            cursor: pointer;
        }
        .forgot-link { font-size: 13px; color: #7b6ef0; font-weight: 500; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }
        .btn-full { width: 100%; justify-content: center; }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #5b6478;
        }
        .auth-footer a { color: #7b6ef0; font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #7b6ef0, #9b76f0);
            box-shadow: 0 12px 24px -12px rgba(123,110,240,0.9);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-primary:hover { box-shadow: 0 14px 30px -10px rgba(123,110,240,0.95); transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #loginMessage {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        #loginMessage.error { display: block; background: #fee; color: #c00; border: 1px solid #fcc; }
        #loginMessage.success { display: block; background: #efe; color: #080; border: 1px solid #cfc; }
        #loginMessage.loading { display: block; background: #eef; color: #446; border: 1px solid #ccd; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #7b6ef0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="../assets/js/config.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand">
                    <div class="mark">D</div>
                    <div>
                        <div class="name">D'zine</div>
                        <div class="sub">BRAND STUDIO</div>
                    </div>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your project</p>
            </div>
            
            <div id="loginMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Get started</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // LOGIN LOGIC - NO EXTERNAL DEPENDENCIES
        // ============================================
        const API_BASE = CONFIG.API_BASE;

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');
        const message = document.getElementById('loginMessage');
        const loginBtn = document.getElementById('loginBtn');
        const rememberMe = document.getElementById('rememberMe');

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                try {
                    const userData = JSON.parse(user);
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                    return true;
                } catch(e) {
                    localStorage.removeItem('user');
                    localStorage.removeItem('token');
                }
            }
            return false;
        }

        // Load saved email
        function loadSavedEmail() {
            const saved = localStorage.getItem('remembered_email');
            if (saved) {
                emailInput.value = saved;
                rememberMe.checked = true;
            }
        }

        // Show message
        function showMessage(type, text) {
            message.className = type;
            message.textContent = text;
        }

        // Handle login
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Clear previous messages
            message.className = '';
            message.textContent = '';
            
            // Validation
            if (!email || !password) {
                showMessage('error', '❌ Please enter both email and password');
                return;
            }
            
            // Show loading
            showMessage('loading', '⏳ Signing in...');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Please wait...';
            
            try {
                console.log('📡 Sending login request to:', `${API_BASE}/auth/login`);
                
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                console.log('📥 Login response:', result);
                
                if (response.ok && result.token && result.user) {
                    // Success
                    showMessage('success', '✅ Login successful! Redirecting...');
                    
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    // Auto-fetch and save project_id for client
                    if (result.user.role === 'client') {
                        fetch(`${API_BASE}/projects`, {
                            headers: { 'Authorization': `Bearer ${result.token}` }
                        }).then(r => r.json()).then(projects => {
                            if (projects && projects.length > 0) {
                                localStorage.setItem('project_id', projects[0].id);
                                localStorage.setItem('projectId', projects[0].id);
                                console.log('✅ Project ID saved:', projects[0].id);
                            }
                        }).catch(() => {});
                    }
                    
                    if (rememberMe.checked) {
                        localStorage.setItem('remembered_email', email);
                    } else {
                        localStorage.removeItem('remembered_email');
                    }
                    
                    setTimeout(() => {
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin/admin-dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1200);
                    
                } else {
                    showMessage('error', '❌ ' + (result.error || 'Login failed. Please try again.'));
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
                
            } catch (error) {
                console.error('❌ Login error:', error);
                showMessage('error', '❌ Cannot connect to server. Make sure backend is running on port 5000.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // Enter key support
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) {
                loadSavedEmail();
            }
        });
    </script>
</body>
</html>
